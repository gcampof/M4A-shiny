services:
  rstudio:
    build: ./rstudio
    container_name: m4a-rstudio
    ports:
      - "3939:8787"
    environment:
      PASSWORD: rstudio
    volumes:
      - ./shiny/app:/home/rstudio/project/shiny
    restart: unless-stopped
 
  shiny:
    build: ./shiny
    container_name: m4a-shiny
    ports:
      - "3838:3838"
    volumes:
      - ./shiny/app:/srv/shiny-server
    restart: unless-stopped
